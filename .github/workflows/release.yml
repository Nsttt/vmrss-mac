name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true
        type: string

permissions:
  contents: write

env:
  BIN_NAME: vmrss
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
            asset_suffix: macos-arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset_suffix: macos-x86_64

    steps:
      - name: Resolve release tag
        id: release
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -z "$tag" ]; then
            echo "Release tag is required" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }} --toolchain stable

      - name: Test
        run: cargo +stable test --locked

      - name: Build
        run: cargo +stable build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: package
        run: |
          asset="vmrss-${{ steps.release.outputs.tag }}-${{ matrix.asset_suffix }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "dist/$BIN_NAME"
          strip "dist/$BIN_NAME" || true
          tar -C dist -czf "$asset" "$BIN_NAME"
          shasum -a 256 "$asset" > "$asset.sha256"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmrss-${{ matrix.asset_suffix }}
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.asset }}.sha256
          if-no-files-found: error

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload \
            "${{ steps.release.outputs.tag }}" \
            "${{ steps.package.outputs.asset }}" \
            "${{ steps.package.outputs.asset }}.sha256" \
            --clobber
